# heimdall — Default Configuration
# Override locally with config.local.yaml (gitignored), or with CLI flags.

target:
  # Directories to scan. Each root is treated as a separate "project".
  # "." means the current working directory.
  roots:
    - .
  # include / exclude accept glob patterns. When omitted, sensible
  # language-agnostic defaults are used (see src/config/types.ts).
  #
  # include / exclude REPLACE the built-in defaults — use them for full control
  # (e.g. scan only Python):
  # include:
  #   - "**/*.py"
  # exclude:
  #   - "**/node_modules/**"   # ⚠️ replaces ALL defaults; you must re-list them
  #
  # includeExtra / excludeExtra ADD to the defaults without losing them — this
  # is what you want to just scan/skip a few extra paths:
  # excludeExtra:
  #   - "**/fixtures/**"
  #   - "**/*.pb.go"
  # includeExtra:
  #   - "**/*.yaml"

ai:
  backends:
    - claude
  concurrency:
    claude: 2
    gemini: 1
    qwen: 1
  timeoutMs: 120000

scan:
  categories:
    - injection
    - broken-access-control
    - idor
    - secrets
    - sensitive-data-exposure
    - cryptography
    - ssrf
    - path-traversal
    - insecure-deserialization
    - dependency
    - misconfiguration
  chunkSizeLines: 300

output:
  formats:
    - json
    - markdown
  reportsDir: .security/reports
  stateDbPath: .security/state.db
